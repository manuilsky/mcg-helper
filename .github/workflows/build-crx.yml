name: Build Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create config.js
        run: echo "window.API_KEY = '${{ secrets.MCG_API_KEY }}';" > src/popup/config.js

      - name: Pack extension
        run: cd src && zip -r ../extension.zip . -x "*.git*" -x ".github/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: extension.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: extension.zip
          allowUpdates: true